<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <title>Site Map</title>
    <link rel="icon" type="image/png" href="icon.png">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f3f0;
        }
        /* Header Styling */
header {
    background-color: #254222;
    padding: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    color: white;
    font-size: 24px;
    font-weight: bold;
}

nav ul {
    display: flex;
    list-style: none;
    padding: 0;
    margin: 0;
}

nav ul li {
    margin-right: 20px;
}

nav ul li a {
    color: white;
    text-decoration: none;
    font-size: 18px;
}

nav ul li a:hover {
    text-decoration: underline;
}

/* Profile Icon */
nav ul li.profile-icon {
    margin-left: auto; /* Push the profile icon to the right */
}

nav ul li.profile-icon a {
    color: white;
    font-size: 20px; /* Adjust the size of the icon */
}

nav ul li.profile-icon a:hover {
    color: #f0f0f0; /* Change color on hover */
}

/* Font Awesome Icon */
.fa-user {
    font-size: 24px; /* Adjust size of the user icon */
}
        .sitemap-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
        }
        svg {
            width: 90%;
            max-width: 1000px;
        }
        rect {
            fill: #94e25b;
            stroke: #00a406;
            stroke-width: 2px;
            transition: fill 0.3s;
        }
        rect:hover {
            fill: #42e448;
            cursor: pointer;
        }
        text {
            font-size: 18px;
            fill: black;
            font-weight: bold;
        }
         /* Footer */
footer {
    background: #254222;
    color: white;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* Footer Container */
.footer-container {
    display: flex;
    justify-content: space-between;
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    align-items: flex-start;
}

/* Left Side: Logo */
.footer-left {
    flex: 1;
}


/* Middle: Website Links (Pages) */
.footer-middle {
    flex: 2;
    display: flex;
    justify-content: center;
}

.footer-middle div {
    text-align: center;
}

.footer-middle h3 {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 10px;
}

.footer-middle ul {
    list-style-type: none;
    padding: 0;
    margin: 0;
}

.footer-middle li {
    margin: 10px 0;
}

.footer-middle a {
    color: white;
    text-decoration: none;
    font-size: 16px;
}

.footer-middle a:hover {
    text-decoration: underline;
}

/* Right Side: Editors Info */
.footer-right {
    flex: 1;
    text-align: right;
}

.footer-right div {
    text-align: right;
}

.footer-right h3 {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 10px;
}

.footer-right ul {
    list-style-type: none;
    padding: 0;
    margin: 0;
}

.footer-right li {
    margin: 10px 0;
}

.footer-right p {
    margin: 0;
}

/* Footer Social Links */
.footer-links {
    margin-top: 20px;
    text-align: center;
}

.footer-links a {
    color: white;
    margin: 0 10px;
    font-size: 20px;
}

.footer-links a:hover {
    opacity: 0.7;
}

    </style>
</head>
<body>
  <!-- Header -->

</header>
